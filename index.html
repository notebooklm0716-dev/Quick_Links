<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Links - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in-bottom { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes zoom-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-in { animation-duration: 300ms; animation-fill-mode: both; }
        .fade-in { animation-name: fade-in; }
        .slide-in-from-bottom-4 { animation-name: slide-in-bottom; }
        .zoom-in { animation-name: zoom-in; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 修正：importは必ず先頭に書く必要があります ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const { useState, useEffect } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyBNRwcy2F7TS5AEAsmVJ9UoDyKhrI69UWo",
          authDomain: "quick-links-4ac3b.firebaseapp.com",
          projectId: "quick-links-4ac3b",
          storageBucket: "quick-links-4ac3b.firebasestorage.app",
          messagingSenderId: "145384041627",
          appId: "1:145384041627:web:9a84887ff7a895aa4c43e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'link-manager-app';

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                if (message) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [message, onClose]);
            if (!message) return null;
            return (
                <div className="fixed bottom-20 left-1/2 -translate-x-1/2 z-[60] animate-in fade-in slide-in-from-bottom-4">
                    <div className={`px-4 py-2 rounded-full shadow-lg flex items-center gap-2 text-sm font-bold text-white ${type === 'error' ? 'bg-red-500' : 'bg-slate-800'}`}>
                        {type !== 'error' && <Icon name="check-circle-2" size={16} />}
                        {message}
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 text-slate-100">
                    <div className="bg-slate-900 rounded-lg shadow-xl w-full max-w-sm border border-slate-700 animate-in zoom-in">
                        <div className="p-4 border-b border-slate-800 flex items-center gap-2 text-red-400">
                            <Icon name="alert-triangle" size={20} />
                            <h3 className="font-bold">{title}</h3>
                        </div>
                        <div className="p-4"><p className="text-slate-300 text-sm">{message}</p></div>
                        <div className="p-3 bg-slate-950 flex justify-end gap-2 rounded-b-lg">
                            <button onClick={onCancel} className="px-3 py-1.5 text-xs text-slate-400 hover:text-white">キャンセル</button>
                            <button onClick={onConfirm} className="px-3 py-1.5 text-xs text-white bg-red-600 hover:bg-red-700 rounded">削除する</button>
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsModal = ({ isOpen, onClose, onExport, onImport }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 text-slate-100">
                    <div className="bg-slate-900 rounded-lg shadow-xl w-full max-w-sm border border-slate-700 animate-in zoom-in">
                        <div className="p-4 border-b border-slate-800 flex justify-between items-center">
                            <h3 className="font-bold flex items-center gap-2 text-sm"><Icon name="settings" size={18} /> データ管理</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-white"><Icon name="x" size={18} /></button>
                        </div>
                        <div className="p-5 grid grid-cols-2 gap-3">
                            <button onClick={onExport} className="flex flex-col items-center p-4 border border-slate-700 rounded-lg hover:bg-slate-800 transition gap-2">
                                <Icon name="download" size={20} className="text-blue-400" />
                                <span className="text-xs font-bold">保存</span>
                            </button>
                            <label className="flex flex-col items-center p-4 border border-slate-700 rounded-lg hover:bg-slate-800 transition gap-2 cursor-pointer">
                                <Icon name="upload" size={20} className="text-emerald-400" />
                                <span className="text-xs font-bold">復元</span>
                                <input type="file" accept=".json" className="hidden" onChange={onImport} />
                            </label>
                        </div>
                    </div>
                </div>
            );
        };

        const InputModal = ({ isOpen, isEdit, initialData, onSave, onCancel }) => {
            const [formData, setFormData] = useState({ title: '', url: '' });
            useEffect(() => { if (isOpen) setFormData(initialData || { title: '', url: 'https://' }); }, [isOpen, initialData]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 text-slate-100">
                    <div className="bg-slate-900 rounded-lg shadow-xl w-full max-w-md border border-slate-700 animate-in zoom-in">
                        <div className="p-3 border-b border-slate-800 flex justify-between items-center">
                            <h3 className="font-bold text-sm text-blue-400">{isEdit ? '編集' : '新規登録'}</h3>
                            <button onClick={onCancel} className="text-slate-400 hover:text-white"><Icon name="x" size={16} /></button>
                        </div>
                        <div className="p-4 space-y-4">
                            <input type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full px-3 py-2 text-sm bg-slate-950 border border-slate-700 rounded text-white" placeholder="タイトル" />
                            <input type="text" value={formData.url} onChange={e => setFormData({...formData, url: e.target.value})} className="w-full px-3 py-2 text-sm bg-slate-950 border border-slate-700 rounded text-white" placeholder="URL" />
                        </div>
                        <div className="p-3 bg-slate-950 flex justify-end gap-2 rounded-b-lg">
                            <button onClick={onCancel} className="px-3 py-1.5 text-xs text-slate-400 hover:text-white">キャンセル</button>
                            <button onClick={() => onSave(formData)} className="px-4 py-1.5 text-xs bg-blue-600 text-white font-bold rounded">保存</button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const ITEMS_PER_PAGE = 12;
            const [user, setUser] = useState(null);
            const [links, setLinks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [modalState, setModalState] = useState({ type: null, data: null });
            const [toast, setToast] = useState({ message: null, type: 'success' });
            const [currentPage, setCurrentPage] = useState(1);

            useEffect(() => {
                signInAnonymously(auth).catch(err => console.error("Auth Error:", err));
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'linkData');
                return onSnapshot(userDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setLinks(docSnap.data().links || []);
                    } else {
                        setLinks([{ id: 1, title: 'Google', url: 'https://google.com' }]);
                    }
                    setLoading(false);
                }, () => setLoading(false));
            }, [user]);

            const syncToCloud = async (newLinks) => {
                if (!user) return;
                try {
                    const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'linkData');
                    await setDoc(userDocRef, { links: newLinks }, { merge: true });
                } catch (err) { setToast({ message: "同期失敗", type: "error" }); }
            };

            const handleSave = async (formData) => {
                const newLinks = modalState.type === 'add' ? [...links, { id: Date.now(), ...formData }] : links.map(l => l.id === modalState.data.id ? { ...l, ...formData } : l);
                setLinks(newLinks);
                await syncToCloud(newLinks);
                setModalState({ type: null, data: null });
                setToast({ message: "保存しました", type: "success" });
            };

            const handleDelete = async () => {
                const newLinks = links.filter(l => l.id !== modalState.data.id);
                setLinks(newLinks);
                await syncToCloud(newLinks);
                setModalState({ type: null, data: null });
                setToast({ message: "削除しました", type: "success" });
            };

            const handleExport = () => {
                const blob = new Blob([JSON.stringify(links, null, 2)], { type: "application/json" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `quick_links.json`;
                a.click();
                setToast({ message: "JSON出力完了", type: "success" });
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported)) {
                            setLinks(imported);
                            await syncToCloud(imported);
                            setToast({ message: "復元完了", type: "success" });
                        }
                    } catch (err) { setToast({ message: "無効なファイル", type: "error" }); }
                };
                reader.readAsText(file);
            };

            const totalPages = Math.ceil(links.length / ITEMS_PER_PAGE);
            const displayedLinks = links.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-slate-950"><div className="w-8 h-8 border-b-2 border-blue-500 rounded-full animate-spin"></div></div>;

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans">
                    <div className="max-w-xl mx-auto min-h-screen flex flex-col bg-slate-900 border-x border-slate-800 shadow-2xl">
                        <header className="px-4 py-4 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-slate-900/95 backdrop-blur-md z-10">
                            <div className="flex items-center gap-2">
                                <h1 className="text-xl font-black bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Quick Links</h1>
                                <Icon name="cloud" size={14} className="text-emerald-500 animate-pulse" />
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setModalState({ type: 'settings' })} className="p-2 hover:bg-slate-800 rounded-full text-slate-400 transition"><Icon name="settings" size={18} /></button>
                                <button onClick={() => setModalState({ type: 'add' })} className="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-lg flex items-center gap-1 transition active:scale-95">
                                    <Icon name="plus" size={14} /> 登録
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 p-3 space-y-1.5">
                            {displayedLinks.length === 0 ? (
                                <div className="flex flex-col items-center justify-center h-40 text-slate-600"><p className="text-sm">リンクがありません</p></div>
                            ) : (
                                displayedLinks.map((link) => (
                                    <div key={link.id} className="flex items-center bg-slate-800/50 border border-slate-700/50 rounded-lg h-12 overflow-hidden hover:border-slate-500 transition group">
                                        <button className="flex-1 px-4 text-left h-full hover:bg-blue-500/5 transition truncate" onClick={() => window.open(link.url, '_blank')}>
                                            <span className="text-sm font-bold text-blue-400 group-hover:text-blue-300">{link.title}</span>
                                        </button>
                                        <div className="flex items-center border-l border-slate-700 h-full bg-slate-900/30">
                                            <button onClick={() => setModalState({ type: 'edit', data: link })} className="w-12 h-full flex justify-center items-center text-slate-500 hover:text-white hover:bg-slate-800 transition"><Icon name="edit-2" size={16} /></button>
                                            <button onClick={() => setModalState({ type: 'delete', data: link })} className="w-12 h-full flex justify-center items-center text-slate-600 hover:text-red-400 hover:bg-red-950/30 transition"><Icon name="trash-2" size={16} /></button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        {totalPages > 1 && (
                            <div className="p-4 flex justify-center items-center gap-6 border-t border-slate-800 bg-slate-900">
                                <button disabled={currentPage === 1} onClick={() => setCurrentPage(p => p - 1)} className="p-2 text-slate-400 disabled:opacity-20 hover:text-white transition"><Icon name="chevron-left" size={24} /></button>
                                <span className="text-sm font-medium text-slate-500">{currentPage} / {totalPages}</span>
                                <button disabled={currentPage === totalPages} onClick={() => setCurrentPage(p => p + 1)} className="p-2 text-slate-400 disabled:opacity-20 hover:text-white transition"><Icon name="chevron-right" size={24} /></button>
                            </div>
                        )}

                        <footer className="px-4 py-2 border-t border-slate-800 text-[10px] text-slate-500 flex justify-between items-center bg-slate-950">
                            <div className="flex items-center gap-1.5"><div className="w-1 h-1 rounded-full bg-emerald-500 shadow-[0_0_4px_#10b981]"></div><span>Cloud Active</span></div>
                            <span className="opacity-40">UID: {user?.uid}</span>
                        </footer>
                    </div>

                    <InputModal isOpen={modalState.type === 'add' || modalState.type === 'edit'} isEdit={modalState.type === 'edit'} initialData={modalState.data} onSave={handleSave} onCancel={() => setModalState({ type: null, data: null })} />
                    <ConfirmModal isOpen={modalState.type === 'delete'} title="削除" message={`「${modalState.data?.title}」を削除しますか？`} onConfirm={handleDelete} onCancel={() => setModalState({ type: null, data: null })} />
                    <SettingsModal isOpen={modalState.type === 'settings'} onClose={() => setModalState({ type: null, data: null })} onExport={handleExport} onImport={handleImport} />
                    <Toast message={toast.message} type={toast.type} onClose={() => setToast({ ...toast, message: null })} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
