<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Links - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
   
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fade-in 200ms both; }
        body { background-color: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBNRwcy2F7TS5AEAsmVJ9UoDyKhrI69UWo",
            authDomain: "quick-links-4ac3b.firebaseapp.com",
            projectId: "quick-links-4ac3b",
            storageBucket: "quick-links-4ac3b.firebasestorage.app",
            messagingSenderId: "145384041627",
            appId: "1:145384041627:web:9a84887ff7a895aa4c43e"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'link-manager-app';

        const Icon = ({ name, size = 16, className = "" }) => (
            <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
        );

        const Toast = ({ message, type = 'success', onClose }) => {
            useEffect(() => {
                if (message) {
                    const timer = setTimeout(onClose, 2800);
                    return () => clearTimeout(timer);
                }
            }, [message, onClose]);
            if (!message) return null;
            return (
                <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] animate-in">
                    <div className={`px-6 py-3 rounded-2xl shadow-2xl text-sm font-bold text-white border border-white/10 ${type === 'error' ? 'bg-red-600' : 'bg-emerald-600'}`}>
                        {message}
                    </div>
                </div>
            );
        };

        const InputModal = ({ isOpen, type, initialData, onSave, onCancel }) => {
            const [form, setForm] = useState({ title: '', url: '' });
            useEffect(() => {
                if (isOpen) setForm(initialData || { title: '', url: 'https://' });
            }, [isOpen, initialData]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                    <div className="bg-slate-900 rounded-3xl w-full max-w-sm border border-slate-700 shadow-2xl animate-in">
                        <div className="p-5 border-b border-slate-800 font-black text-blue-400 flex items-center gap-2">
                            <Icon name={type === 'add' ? 'plus-circle' : 'edit-3'} size={20} />
                            {type === 'add' ? '新規追加' : '編集'}
                        </div>
                        <div className="p-6 space-y-4">
                            <input 
                                type="text" 
                                value={form.title} 
                                onChange={e => setForm({...form, title: e.target.value})} 
                                className="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-sm focus:border-blue-500 outline-none" 
                                placeholder="サイト名" 
                            />
                            <input 
                                type="text" 
                                value={form.url} 
                                onChange={e => setForm({...form, url: e.target.value})} 
                                className="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-sm font-mono focus:border-blue-500 outline-none" 
                                placeholder="https://..." 
                            />
                        </div>
                        <div className="p-5 flex justify-end gap-3 bg-slate-950/30">
                            <button onClick={onCancel} className="px-5 py-2 text-sm text-slate-500 font-bold">キャンセル</button>
                            <button onClick={() => onSave(form)} className="px-8 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-sm font-bold shadow-lg active:scale-95 transition">保存</button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const ITEMS_PER_PAGE = 10;
            const [user, setUser] = useState(null);
            const [links, setLinks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [modalState, setModalState] = useState({ type: null, data: null });
            const [toast, setToast] = useState({ message: null, type: 'success' });
            const [currentPage, setCurrentPage] = useState(1);

            // Lucideアイコン再描画
            useEffect(() => {
                const trigger = () => window.lucide?.createIcons();
                trigger();
                const timers = [100, 400, 800].map(ms => setTimeout(trigger, ms));
                return () => timers.forEach(clearTimeout);
            }, [links, modalState.type, currentPage]);

            const syncToCloud = useCallback(async (newLinks) => {
                if (!user) return;
                try {
                    await db.doc(`artifacts/${appId}/users/${user.uid}/settings/linkData`)
                        .set({ links: newLinks }, { merge: true });
                } catch (err) {
                    console.error(err);
                    setToast({ message: "同期に失敗しました", type: "error" });
                }
            }, [user]);

            // 認証
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    if (u) {
                        setUser(u);
                    } else {
                        auth.signInAnonymously().catch(err => {
                            console.error("Auth Error:", err);
                            setToast({ message: "認証エラー", type: "error" });
                        });
                    }
                });
                return unsubscribe;
            }, []);

            // Firestoreリアルタイム監視（重要修正）
            useEffect(() => {
                if (!user) return;

                const unsubscribe = db.doc(`artifacts/${appId}/users/${user.uid}/settings/linkData`)
                    .onSnapshot(
                        (snap) => {
                            if (snap.exists) {
                                setLinks(snap.data()?.links || []);
                            } else {
                                const init = [{ id: Date.now(), title: 'Google', url: 'https://google.com' }];
                                setLinks(init);
                                syncToCloud(init);
                            }
                            setLoading(false);
                        },
                        (err) => {
                            console.error("Firestore Error:", err);
                            setLoading(false);
                            setToast({ message: "データ取得に失敗しました", type: "error" });
                        }
                    );

                return unsubscribe;
            }, [user, syncToCloud]);

            const handleSave = async (formData) => {
                if (!formData.title.trim() || !formData.url.trim()) {
                    setToast({ message: "タイトルとURLを入力してください", type: "error" });
                    return;
                }

                const isAdd = modalState.type === 'add';
                let newLinks;

                if (isAdd) {
                    newLinks = [...links, { id: Date.now(), ...formData }];
                } else {
                    newLinks = links.map(l => 
                        l.id === modalState.data?.id ? { ...l, ...formData } : l
                    );
                }

                setLinks(newLinks);
                await syncToCloud(newLinks);
                setModalState({ type: null, data: null });
                setToast({ message: isAdd ? "追加しました" : "更新しました", type: "success" });
            };

            const handleDelete = async () => {
                if (!modalState.data?.id) return;
                const newLinks = links.filter(l => l.id !== modalState.data.id);
                setLinks(newLinks);
                await syncToCloud(newLinks);
                setModalState({ type: null, data: null });
                setToast({ message: "削除しました", type: "success" });
            };

            const totalPages = Math.ceil(links.length / ITEMS_PER_PAGE);
            const displayedLinks = links.slice(
                (currentPage - 1) * ITEMS_PER_PAGE,
                currentPage * ITEMS_PER_PAGE
            );

            if (loading) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center text-blue-400 font-bold text-xl animate-pulse">
                        Connecting to Cloud...
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 p-3">
                    <div className="max-w-md mx-auto bg-slate-900 rounded-[2.5rem] shadow-2xl flex flex-col min-h-[88vh] border border-slate-800 overflow-hidden">
                        {/* Header */}
                        <header className="p-5 bg-slate-900/90 backdrop-blur-xl border-b border-slate-700 flex justify-between items-center sticky top-0 z-20">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow">
                                    <Icon name="zap" className="text-white" size={22} />
                                </div>
                                <h1 className="font-black text-2xl tracking-tighter italic">Quick Links</h1>
                            </div>
                            <button 
                                onClick={() => setModalState({ type: 'add' })} 
                                className="bg-blue-600 hover:bg-blue-500 p-3 rounded-2xl text-white shadow-lg active:scale-95 transition"
                            >
                                <Icon name="plus" size={24} />
                            </button>
                        </header>

                        {/* Links List */}
                        <div className="flex-1 p-4 space-y-3 overflow-y-auto custom-scrollbar">
                            {displayedLinks.length === 0 ? (
                                <div className="flex flex-col items-center justify-center h-full text-slate-500 py-20">
                                    <Icon name="inbox" size={64} className="opacity-30 mb-4" />
                                    <p className="font-medium">リンクがありません</p>
                                    <p className="text-xs mt-2">右上の + ボタンから追加してください</p>
                                </div>
                            ) : (
                                displayedLinks.map(link => (
                                    <div key={link.id} className="group bg-slate-800/50 border border-slate-700 hover:border-blue-500/50 rounded-3xl flex items-center transition-all">
                                        <button 
                                            onClick={() => window.open(link.url, '_blank')}
                                            className="flex-1 p-4 text-left"
                                        >
                                            <div className="font-semibold text-blue-400 group-hover:text-blue-300 transition-colors truncate">{link.title}</div>
                                            <div className="text-[10px] text-slate-500 font-mono truncate mt-0.5">{link.url}</div>
                                        </button>
                                        <div className="pr-4 flex gap-1">
                                            <button onClick={() => setModalState({ type: 'edit', data: link })} className="p-2 text-slate-400 hover:text-blue-400 transition">
                                                <Icon name="edit-2" size={18} />
                                            </button>
                                            <button onClick={() => setModalState({ type: 'delete', data: link })} className="p-2 text-slate-400 hover:text-red-400 transition">
                                                <Icon name="trash-2" size={18} />
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        {/* Pagination */}
                        {totalPages > 1 && (
                            <div className="p-4 border-t border-slate-700 flex justify-between items-center bg-slate-950/50">
                                <button 
                                    disabled={currentPage === 1}
                                    onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                    className="disabled:opacity-30 p-2 text-slate-400 hover:text-white transition"
                                >
                                    <Icon name="chevron-left" size={28} />
                                </button>
                                <span className="text-xs font-mono text-slate-500">{currentPage} / {totalPages}</span>
                                <button 
                                    disabled={currentPage === totalPages}
                                    onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                    className="disabled:opacity-30 p-2 text-slate-400 hover:text-white transition"
                                >
                                    <Icon name="chevron-right" size={28} />
                                </button>
                            </div>
                        )}

                        <footer className="p-4 text-[10px] text-slate-600 font-mono flex justify-between border-t border-slate-800">
                            <span>Cloud Sync Ready</span>
                            <span className="opacity-50">{user?.uid?.slice(0, 12) || ''}</span>
                        </footer>
                    </div>

                    {/* Modals */}
                    <InputModal
                        isOpen={modalState.type === 'add' || modalState.type === 'edit'}
                        type={modalState.type}
                        initialData={modalState.data}
                        onSave={handleSave}
                        onCancel={() => setModalState({ type: null, data: null })}
                    />

                    {modalState.type === 'delete' && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-red-900/30 rounded-3xl w-full max-w-xs p-8 text-center animate-in">
                                <Icon name="alert-triangle" size={48} className="mx-auto text-red-500 mb-6" />
                                <p className="text-lg font-bold mb-2">本当に削除しますか？</p>
                                <p className="text-slate-400 text-sm mb-8 break-all">「{modalState.data?.title}」</p>
                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => setModalState({ type: null })}
                                        className="flex-1 py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 rounded-2xl transition"
                                    >
                                        キャンセル
                                    </button>
                                    <button 
                                        onClick={handleDelete}
                                        className="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white rounded-2xl text-sm font-medium transition"
                                    >
                                        削除する
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <Toast 
                        message={toast.message} 
                        type={toast.type} 
                        onClose={() => setToast({ message: null })} 
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
