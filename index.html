<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Links - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fade-in 200ms both; }
        body { background-color: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // 【重要】Firebaseコンソールから取得した最新の設定に置き換えてください
        const firebaseConfig = {
          apiKey: "AIzaSyBNRwcy2F7TS5AEASmVJ9UoDyKhrI69UWo",
          authDomain: "quick-links-4ac3b.firebaseapp.com",
          projectId: "quick-links-4ac3b",
          storageBucket: "quick-links-4ac3b.firebasestorage.app",
          messagingSenderId: "143584041627",
          appId: "1:143584041627:web:9a84887fff7a895aa4c43e"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'link-manager-app';

        const Icon = ({ name, size = 16, className = "" }) => (
            <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
        );

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                if (message) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [message, onClose]);
            if (!message) return null;
            return (
                <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] animate-in text-center">
                    <div className={`px-6 py-2 rounded-full shadow-2xl flex items-center gap-2 text-sm font-bold text-white border border-white/10 ${type === 'error' ? 'bg-red-600' : 'bg-slate-800'}`}>
                        {message}
                    </div>
                </div>
            );
        };

        const InputModal = ({ isOpen, type, initialData, onSave, onCancel }) => {
            const [form, setForm] = useState({ title: '', url: '' });
            useEffect(() => {
                if (isOpen) setForm(initialData || { title: '', url: 'https://' });
            }, [isOpen, initialData]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                    <div className="bg-slate-900 rounded-3xl w-full max-w-sm border border-slate-700 shadow-2xl animate-in">
                        <div className="p-5 border-b border-slate-800 font-black text-blue-400 flex items-center gap-2">
                            <Icon name={type === 'add' ? 'plus-circle' : 'edit-3'} size={20} />
                            {type === 'add' ? '新規追加' : '編集'}
                        </div>
                        <div className="p-6 space-y-4">
                            <input type="text" value={form.title} onChange={e => setForm({...form, title: e.target.value})} className="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-sm focus:border-blue-500 outline-none transition-all" placeholder="サイト名" />
                            <input type="text" value={form.url} onChange={e => setForm({...form, url: e.target.value})} className="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-sm font-mono focus:border-blue-500 outline-none transition-all" placeholder="https://..." />
                        </div>
                        <div className="p-5 flex justify-end gap-3 bg-slate-950/30">
                            <button onClick={onCancel} className="px-5 py-2 text-sm text-slate-500 font-bold">戻る</button>
                            <button onClick={() => onSave(form)} className="px-8 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-lg shadow-blue-900/40 active:scale-95 transition">保存</button>
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsModal = ({ isOpen, onClose, onExport, onImport }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                    <div className="bg-slate-900 rounded-3xl w-full max-w-sm border border-slate-700 animate-in overflow-hidden shadow-2xl">
                        <div className="p-5 border-b border-slate-800 flex justify-between items-center"><h3 className="font-bold text-slate-100">データ管理</h3><button onClick={onClose} className="text-slate-500 hover:text-white transition"><Icon name="x" size={24} /></button></div>
                        <div className="p-8 grid grid-cols-2 gap-4 bg-slate-950/20">
                            <button onClick={onExport} className="flex flex-col items-center gap-3 p-6 border border-slate-800 rounded-2xl hover:bg-slate-800 transition text-blue-400 group"><Icon name="download" size={32} className="group-hover:scale-110 transition-transform" /><span className="text-xs font-bold">保存</span></button>
                            <label className="flex flex-col items-center gap-3 p-6 border border-slate-800 rounded-2xl hover:bg-slate-800 transition text-emerald-400 cursor-pointer group"><Icon name="upload" size={32} className="group-hover:scale-110 transition-transform" /><span className="text-xs font-bold">復元</span><input type="file" className="hidden" accept=".json" onChange={onImport} /></label>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const ITEMS_PER_PAGE = 10;
            const [user, setUser] = useState(null);
            const [links, setLinks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [modalState, setModalState] = useState({ type: null, data: null });
            const [toast, setToast] = useState({ message: null, type: 'success' });
            const [currentPage, setCurrentPage] = useState(1);

            useEffect(() => {
                const trigger = () => { if (window.lucide) window.lucide.createIcons(); };
                trigger();
                const timers = [50, 150, 400, 1000, 2500, 4000].map(ms => setTimeout(trigger, ms));
                return () => timers.forEach(clearTimeout);
            }, [links, modalState.type, currentPage, loading]);

            const syncToCloud = useCallback(async (newLinks) => {
                if (!user) return;
                try {
                    await db.doc(`artifacts/${appId}/users/${user.uid}/settings/linkData`).set({ links: newLinks }, { merge: true });
                } catch (err) { setToast({ message: "同期に失敗しました", type: "error" }); }
            }, [user]);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => u ? setUser(u) : auth.signInAnonymously().catch(err => {
                    console.error("Auth Error:", err);
                    setToast({ message: "認証エラー: 設定を確認してください", type: "error" });
                }));
                return unsubscribe;
            }, []);

            useEffect(() => {
                if (!user) return;
                return db.doc(`artifacts/${appId}/users/${user.uid}/settings/linkData`).onSnapshot(
                    snap => {
                        if (snap.exists()) setLinks(snap.data().links || []);
                        else { const init = [{id: 1, title: 'Google', url: 'https://google.com'}]; setLinks(init); syncToCloud(init); }
                        setLoading(false);
                    },
                    err => { 
                        console.error("Firestore Error:", err); 
                        setLoading(false); 
                        setToast({ message: "データの取得に失敗しました", type: "error" });
                    }
                );
            }, [user, syncToCloud]);

            const adjustPage = (newLinks) => {
                const total = Math.ceil(newLinks.length / ITEMS_PER_PAGE);
                if (currentPage > total && total >= 1) setCurrentPage(total);
            };

            const handleSave = async (formData) => {
                if (!formData.title.trim() || !formData.url.trim()) {
                    setToast({ message: "入力項目が空です", type: "error" });
                    return;
                }
                const isAdd = modalState.type === 'add';
                const newLinks = isAdd
                    ? [...links, { id: Date.now(), ...formData }] 
                    : links.map(l => l.id === modalState.data?.id ? { ...l, ...formData } : l);
                
                setLinks(newLinks);
                await syncToCloud(newLinks);
                adjustPage(newLinks);
                setModalState({ type: null, data: null });
                setToast({ message: isAdd ? "リンクを追加しました" : "リンクを更新しました", type: "success" });
            };

            const handleDelete = async () => {
                if (!modalState.data?.id) return;
                const newLinks = links.filter(l => l.id !== modalState.data.id);
                setLinks(newLinks);
                await syncToCloud(newLinks);
                adjustPage(newLinks);
                setModalState({ type: null, data: null });
                setToast({ message: "削除しました", type: "success" });
            };

            const handleExport = () => {
                try {
                    const blob = new Blob([JSON.stringify(links, null, 2)], { type: "application/json" });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `quick_links_backup.json`;
                    a.click();
                    setToast({ message: "バックアップを保存しました", type: "success" });
                } catch (e) { setToast({ message: "エクスポート失敗", type: "error" }); }
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported)) {
                            setLinks(imported);
                            await syncToCloud(imported);
                            setCurrentPage(1);
                            setToast({ message: "復元が完了しました", type: "success" });
                            setModalState({ type: null });
                        }
                    } catch { setToast({ message: "ファイル形式が不正です", type: "error" }); }
                };
                reader.readAsText(file);
            };

            const totalPages = Math.ceil(links.length / ITEMS_PER_PAGE);
            const displayedLinks = links.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            if (loading) return <div className="min-h-screen bg-slate-950 flex items-center justify-center text-blue-500 font-bold uppercase tracking-widest animate-pulse">Establishing Link...</div>;

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 p-2 sm:p-4 custom-scrollbar">
                    <div className="max-w-md mx-auto bg-slate-900 rounded-[2.5rem] shadow-2xl flex flex-col min-h-[85vh] border border-slate-800 overflow-hidden">
                        <header className="p-5 bg-slate-900/80 backdrop-blur-xl border-b border-slate-800 flex justify-between items-center sticky top-0 z-20">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/50">
                                    <Icon name="zap" className="text-white" size={24} />
                                </div>
                                <div>
                                    <h1 className="font-black text-lg leading-none tracking-tighter uppercase italic">Quick Links</h1>
                                    <div className="flex items-center gap-1.5 mt-1">
                                        <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                        <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Connected</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-1.5">
                                <button onClick={() => setModalState({ type: 'settings' })} className="p-2.5 text-slate-500 hover:text-white transition hover:bg-slate-800 rounded-xl"><Icon name="database" size={20} /></button>
                                <button onClick={() => setModalState({ type: 'add' })} className="bg-blue-600 hover:bg-blue-500 p-2.5 rounded-xl text-white shadow-lg shadow-blue-900/40 active:scale-95 transition"><Icon name="plus" size={24} /></button>
                            </div>
                        </header>

                        <div className="flex-1 p-3 space-y-2.5">
                            {displayedLinks.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-28 text-slate-700 animate-in">
                                    <div className="w-24 h-24 bg-slate-800/20 rounded-full flex items-center justify-center mb-6 border border-slate-800">
                                        <Icon name="inbox" size={48} className="opacity-10" />
                                    </div>
                                    <p className="font-black text-sm text-slate-500 tracking-tight">リンクが空っぽです</p>
                                    <p className="text-[10px] mt-3 bg-slate-800 px-4 py-2 rounded-full text-slate-400 font-bold uppercase tracking-widest border border-slate-700 shadow-inner">
                                        右上の ＋ ボタンから追加してください
                                    </p>
                                </div>
                            ) : (
                                displayedLinks.map(link => (
                                    <div key={link.id} className="flex items-center bg-slate-800/20 border border-slate-700/30 rounded-[1.5rem] group animate-in hover:border-blue-500/30 hover:bg-slate-800/50 transition-all">
                                        <button onClick={() => window.open(link.url, '_blank')} className="flex-1 p-4 text-left overflow-hidden">
                                            <div className="text-sm font-bold text-blue-400 truncate group-hover:text-blue-300 transition-colors mb-0.5 tracking-tight">{link.title}</div>
                                            <div className="text-[9px] text-slate-600 truncate font-mono tracking-tighter opacity-60 group-hover:opacity-100 transition-opacity">{link.url}</div>
                                        </button>
                                        <div className="flex pr-3 gap-1">
                                            <button onClick={() => setModalState({ type: 'edit', data: link })} className="p-2.5 text-slate-500 hover:text-blue-400 hover:bg-blue-400/10 rounded-xl transition"><Icon name="edit-2" size={18} /></button>
                                            <button onClick={() => setModalState({ type: 'delete', data: link })} className="p-2.5 text-slate-500 hover:text-red-400 hover:bg-red-400/10 rounded-xl transition"><Icon name="trash-2" size={18} /></button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        {totalPages > 1 && (
                            <div className="p-5 border-t border-slate-800 flex justify-between items-center bg-slate-950/20">
                                <button disabled={currentPage === 1} onClick={() => setCurrentPage(p => p - 1)} className="p-2.5 disabled:opacity-5 hover:bg-slate-800 rounded-xl text-slate-400 transition"><Icon name="chevron-left" size={28} /></button>
                                <span className="text-[10px] font-black tracking-[0.4em] text-slate-600 uppercase ml-3 leading-none">{currentPage} / {totalPages}</span>
                                <button disabled={currentPage === totalPages} onClick={() => setCurrentPage(p => p + 1)} className="p-2.5 disabled:opacity-5 hover:bg-slate-800 rounded-xl text-slate-400 transition"><Icon name="chevron-right" size={28} /></button>
                            </div>
                        )}
                        
                        <footer className="p-4 bg-slate-950/50 border-t border-slate-800 text-[9px] text-slate-700 flex justify-between font-mono tracking-widest uppercase italic font-black">
                            <span>Ready</span>
                            <span className="opacity-30">ID: {user?.uid.slice(0, 12)}</span>
                        </footer>
                    </div>

                    <InputModal 
                        isOpen={modalState.type === 'add' || modalState.type === 'edit'} 
                        type={modalState.type} 
                        initialData={modalState.data} 
                        onSave={handleSave} 
                        onCancel={() => setModalState({ type: null, data: null })} 
                    />

                    {modalState.type === 'delete' && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4 backdrop-blur-md">
                            <div className="bg-slate-900 border border-red-900/30 p-8 rounded-[2.5rem] w-full max-w-xs animate-in shadow-2xl text-center">
                                <div className="w-20 h-20 bg-red-900/20 text-red-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-inner border border-red-900/20"><Icon name="alert-triangle" size={40} /></div>
                                <p className="text-md font-black text-slate-100 mb-2">リンクを削除しますか？</p>
                                <p className="text-[11px] text-slate-500 mb-8 truncate px-4 font-mono">"{modalState.data?.title}"</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setModalState({ type: null })} className="flex-1 py-3 text-xs text-slate-500 font-bold hover:bg-slate-800 rounded-2xl transition">やめる</button>
                                    <button onClick={handleDelete} className="flex-1 py-3 bg-red-600 text-white rounded-2xl text-xs font-bold shadow-lg shadow-red-900/40 active:scale-95 transition">削除する</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <SettingsModal 
                        isOpen={modalState.type === 'settings'} 
                        onClose={() => setModalState({ type: null })} 
                        onExport={handleExport} 
                        onImport={handleImport} 
                    />
                    <Toast message={toast.message} type={toast.type} onClose={() => setToast({ message: null, type: 'success' })} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
