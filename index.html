<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Links - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
   
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fade-in 200ms both; }
        body { background-color: #020617; font-family: sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // === Firebase設定（最新のものに更新）===
        const firebaseConfig = {
            apiKey: "AIzaSyBNRwcy2F7TS5AEASmVJ9UoDyKhrI69UWo",
            authDomain: "quick-links-4ac3b.firebaseapp.com",
            projectId: "quick-links-4ac3b",
            storageBucket: "quick-links-4ac3b.firebasestorage.app",
            messagingSenderId: "145384041627",   // 正しい値に修正
            appId: "1:145384041627:web:9a84887ff7a895aa4c43e"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'link-manager-app';

        const Icon = ({ name, size = 16, className = "" }) => (
            <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
        );

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                if (message) {
                    const timer = setTimeout(onClose, 3000);
                    return () => clearTimeout(timer);
                }
            }, [message, onClose]);
            if (!message) return null;
            return (
                <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] animate-in text-center px-4">
                    <div className={`px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-2 text-sm font-bold text-white border border-white/10 ${type === 'error' ? 'bg-red-600' : 'bg-emerald-600'}`}>
                        {message}
                    </div>
                </div>
            );
        };

        // データ管理モーダル（バックアップ・復元）
        const SettingsModal = ({ isOpen, onClose, onExport, onImport }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
                    <div className="bg-slate-900 rounded-3xl w-full max-w-sm border border-slate-700 animate-in overflow-hidden shadow-2xl">
                        <div className="p-5 border-b border-slate-800 flex justify-between items-center">
                            <h3 className="font-bold text-slate-100 flex items-center gap-2">
                                <Icon name="database" size={20} /> データ管理
                            </h3>
                            <button onClick={onClose} className="text-slate-500 hover:text-white">
                                <Icon name="x" size={24} />
                            </button>
                        </div>
                        <div className="p-8 grid grid-cols-2 gap-4 bg-slate-950/20">
                            <button onClick={onExport} className="flex flex-col items-center gap-3 p-6 border border-slate-800 rounded-2xl hover:bg-slate-800 transition text-blue-400 group">
                                <Icon name="download" size={32} className="group-hover:scale-110 transition-transform" />
                                <span className="text-xs font-bold">バックアップ保存</span>
                            </button>
                            <label className="flex flex-col items-center gap-3 p-6 border border-slate-800 rounded-2xl hover:bg-slate-800 transition text-emerald-400 cursor-pointer group">
                                <Icon name="upload" size={32} className="group-hover:scale-110 transition-transform" />
                                <span className="text-xs font-bold">JSONから復元</span>
                                <input type="file" className="hidden" accept=".json" onChange={onImport} />
                            </label>
                        </div>
                        <div className="px-6 pb-6 text-[10px] text-slate-500 text-center">
                            AndroidではJSON復元をおすすめします
                        </div>
                    </div>
                </div>
            );
        };

        const InputModal = ({ isOpen, type, initialData, onSave, onCancel }) => {
            const [form, setForm] = useState({ title: '', url: '' });
            useEffect(() => {
                if (isOpen) setForm(initialData || { title: '', url: 'https://' });
            }, [isOpen, initialData]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                    <div className="bg-slate-900 rounded-3xl w-full max-w-sm border border-slate-700 shadow-2xl animate-in">
                        <div className="p-5 border-b border-slate-800 font-black text-blue-400 flex items-center gap-2">
                            <Icon name={type === 'add' ? 'plus-circle' : 'edit-3'} size={20} />
                            {type === 'add' ? '新規追加' : '編集'}
                        </div>
                        <div className="p-6 space-y-4">
                            <input type="text" value={form.title} onChange={e => setForm({...form, title: e.target.value})} className="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-sm text-white focus:border-blue-500 outline-none" placeholder="サイト名" />
                            <input type="text" value={form.url} onChange={e => setForm({...form, url: e.target.value})} className="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-sm font-mono text-white focus:border-blue-500 outline-none" placeholder="https://..." />
                        </div>
                        <div className="p-5 flex justify-end gap-3 bg-slate-950/30">
                            <button onClick={onCancel} className="px-5 py-2 text-sm text-slate-500 font-bold">戻る</button>
                            <button onClick={() => onSave(form)} className="px-8 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-lg active:scale-95 transition">保存</button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const ITEMS_PER_PAGE = 10;
            const [user, setUser] = useState(null);
            const [links, setLinks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [modalState, setModalState] = useState({ type: null, data: null });
            const [toast, setToast] = useState({ message: null, type: 'success' });
            const [currentPage, setCurrentPage] = useState(1);

            useEffect(() => {
                const trigger = () => { if (window.lucide) window.lucide.createIcons(); };
                trigger();
                const timers = [100, 500, 2000].map(ms => setTimeout(trigger, ms));
                return () => timers.forEach(clearTimeout);
            }, [links, modalState.type, currentPage, loading]);

            const syncToCloud = useCallback(async (newLinks) => {
                if (!user) return;
                try {
                    await db.doc(`artifacts/${appId}/users/${user.uid}/settings/linkData`).set({ links: newLinks }, { merge: true });
                } catch (err) { 
                    setToast({ message: "同期エラー", type: "error" }); 
                }
            }, [user]);

            // 認証（少し強化）
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    if (u) {
                        setUser(u);
                    } else {
                        auth.signInAnonymously().catch(err => {
                            console.error("Auth Error:", err);
                            setToast({ message: "認証エラー: Firebase設定を確認してください", type: "error" });
                            setLoading(false);
                        });
                    }
                });
                return unsubscribe;
            }, []);

            // Firestore監視
            useEffect(() => {
                if (!user) return;
                return db.doc(`artifacts/${appId}/users/${user.uid}/settings/linkData`).onSnapshot(
                    snap => {
                        if (snap.exists) {
                            setLinks(snap.data()?.links || []);
                        } else {
                            const init = [{id: 1, title: 'Google', url: 'https://google.com'}];
                            setLinks(init);
                            syncToCloud(init);
                        }
                        setLoading(false);
                    },
                    err => {
                        console.error("Firestore Error:", err);
                        setLoading(false);
                    }
                );
            }, [user, syncToCloud]);

            // バックアップ
            const handleExport = () => {
                const date = new Date().toISOString().slice(0,16).replace(/[:T]/g, '-');
                const blob = new Blob([JSON.stringify(links, null, 2)], { type: "application/json" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `quick_links_backup_${date}.json`;
                a.click();
                setToast({ message: "バックアップを保存しました", type: "success" });
            };

            // 復元
            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!confirm("現在のリンクをすべて上書きして復元しますか？")) return;

                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported)) {
                            setLinks(imported);
                            await syncToCloud(imported);
                            setCurrentPage(1);
                            setModalState({ type: null });
                            setToast({ message: "JSONから復元しました", type: "success" });
                        } else {
                            setToast({ message: "ファイル形式が不正です", type: "error" });
                        }
                    } catch {
                        setToast({ message: "JSONの読み込みに失敗しました", type: "error" });
                    }
                };
                reader.readAsText(file);
            };

            const handleSave = async (formData) => {
                if (!formData.title.trim() || !formData.url.trim()) return setToast({ message: "未入力です", type: "error" });
                const isAdd = modalState.type === 'add';
                const newLinks = isAdd
                    ? [...links, { id: Date.now(), ...formData }]
                    : links.map(l => l.id === modalState.data?.id ? { ...l, ...formData } : l);
               
                setLinks(newLinks);
                await syncToCloud(newLinks);
                setModalState({ type: null, data: null });
                setToast({ message: isAdd ? "追加しました" : "更新しました" });
            };

            const handleDelete = async () => {
                const newLinks = links.filter(l => l.id !== modalState.data.id);
                setLinks(newLinks);
                await syncToCloud(newLinks);
                setModalState({ type: null, data: null });
                setToast({ message: "削除しました" });
            };

            const totalPages = Math.ceil(links.length / ITEMS_PER_PAGE);
            const displayedLinks = links.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            if (loading) return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-blue-500 gap-4">
                    <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-xs font-bold tracking-widest animate-pulse">CONNECTING...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 p-2 sm:p-4">
                    <div className="max-w-md mx-auto bg-slate-900 rounded-[2.5rem] shadow-2xl flex flex-col min-h-[85vh] border border-slate-800 overflow-hidden relative">
                        <header className="p-5 bg-slate-900/80 backdrop-blur-xl border-b border-slate-800 flex justify-between items-center sticky top-0 z-20">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center">
                                    <Icon name="zap" className="text-white" size={24} />
                                </div>
                                <h1 className="font-black text-xl italic uppercase">Quick Links</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setModalState({ type: 'settings' })} className="p-2.5 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition">
                                    <Icon name="database" size={20} />
                                </button>
                                <button onClick={() => setModalState({ type: 'add' })} className="bg-blue-600 hover:bg-blue-500 p-2.5 rounded-xl text-white shadow-lg active:scale-95 transition">
                                    <Icon name="plus" size={24} />
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 p-3 space-y-2.5 custom-scrollbar overflow-y-auto">
                            {displayedLinks.length === 0 ? (
                                <div className="text-center py-20 opacity-20 font-bold uppercase tracking-widest">No Links</div>
                            ) : (
                                displayedLinks.map(link => (
                                    <div key={link.id} className="flex items-center bg-slate-800/30 border border-slate-700/30 rounded-[1.5rem] group animate-in">
                                        <button onClick={() => window.open(link.url, '_blank')} className="flex-1 p-4 text-left overflow-hidden">
                                            <div className="text-sm font-bold text-blue-400 truncate group-hover:text-blue-300 transition-colors">{link.title}</div>
                                            <div className="text-[9px] text-slate-600 truncate font-mono mt-0.5">{link.url}</div>
                                        </button>
                                        <div className="flex pr-3 gap-1">
                                            <button onClick={() => setModalState({ type: 'edit', data: link })} className="p-2.5 text-slate-500 hover:text-blue-400 transition"><Icon name="edit-2" size={18} /></button>
                                            <button onClick={() => setModalState({ type: 'delete', data: link })} className="p-2.5 text-slate-500 hover:text-red-400 transition"><Icon name="trash-2" size={18} /></button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        {totalPages > 1 && (
                            <div className="p-5 border-t border-slate-800 flex justify-between items-center bg-slate-950/20">
                                <button disabled={currentPage === 1} onClick={() => setCurrentPage(p => p - 1)} className="p-2 disabled:opacity-5 text-slate-400 transition"><Icon name="chevron-left" size={28} /></button>
                                <span className="text-[10px] font-black text-slate-600 uppercase">{currentPage} / {totalPages}</span>
                                <button disabled={currentPage === totalPages} onClick={() => setCurrentPage(p => p + 1)} className="p-2 disabled:opacity-5 text-slate-400 transition"><Icon name="chevron-right" size={28} /></button>
                            </div>
                        )}

                        <footer className="p-4 bg-slate-950/50 border-t border-slate-800 text-[9px] text-slate-700 flex justify-between font-mono font-bold italic uppercase tracking-widest">
                            <span>Status: Cloud Sync</span>
                            <span className="opacity-30">{user?.uid?.slice(0, 10) || ''}</span>
                        </footer>
                    </div>

                    <InputModal
                        isOpen={modalState.type === 'add' || modalState.type === 'edit'}
                        type={modalState.type}
                        initialData={modalState.data}
                        onSave={handleSave}
                        onCancel={() => setModalState({ type: null, data: null })}
                    />

                    {modalState.type === 'delete' && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-700 p-8 rounded-[2.5rem] w-full max-w-xs animate-in text-center shadow-2xl">
                                <p className="text-white font-bold mb-8">削除してもよろしいですか？</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setModalState({ type: null })} className="flex-1 py-3 text-xs text-slate-500 font-bold">戻る</button>
                                    <button onClick={handleDelete} className="flex-1 py-3 bg-red-600 text-white rounded-xl text-xs font-bold">削除する</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <SettingsModal
                        isOpen={modalState.type === 'settings'}
                        onClose={() => setModalState({ type: null })}
                        onExport={handleExport}
                        onImport={handleImport}
                    />

                    <Toast message={toast.message} onClose={() => setToast({ message: null })} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
